version: '3.8'

x-airflow-common:
  &airflow-common
  image: apache/airflow:2.9.2-python3.11
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth'
    AIRFLOW__SCHEDULER__SCHEDULER_HEARTBEAT_SEC: 10
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'true'
    # Enable DAG Builder specific settings
    AIRFLOW__CORE__DAGS_FOLDER: '/opt/airflow/dags'
    AIRFLOW__CORE__PLUGINS_FOLDER: '/opt/airflow/plugins'
    # Environment variables for dag_builder
    APP_API_TOKEN: ${APP_API_TOKEN:-your_api_token_here}
    DAG_BUILDER_LOG_FILE: /opt/airflow/logs/dag_builder.log
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - ./example:/opt/airflow/example
  depends_on:
    &airflow-common-depends-on
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U airflow -d airflow']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  airflow-webserver:
    <<: *airflow-common
    command: airflow webserver
    ports:
      - 8080:8080
    healthcheck:
      test: ['CMD-SHELL', "curl -f 'http://localhost:8080/health' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5

  airflow-scheduler:
    <<: *airflow-common
    command: airflow scheduler
    healthcheck:
      test: ['CMD-SHELL', 'airflow jobs check --job-type SchedulerJob --hostname $${HOSTNAME} || exit 1']
      interval: 10s
      timeout: 10s
      retries: 5

  airflow-worker:
    <<: *airflow-common
    command: airflow celery worker
    healthcheck:
      test: ['CMD-SHELL', 'celery inspect ping || exit 1']
      interval: 10s
      timeout: 10s
      retries: 5

  airflow-init:
    <<: *airflow-common
    command: >
      bash -c "
      airflow users create -r Admin -u admin -e admin@example.com -f admin -l user -p admin
      airflow db upgrade &&
      airflow connections import /opt/airflow/connections.json || true
      "
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_UPGRADE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin

  flower:
    <<: *airflow-common
    command: airflow celery flower
    ports:
      - 5555:5555
    healthcheck:
      test: ['CMD-SHELL', "curl -f 'http://localhost:5555/health' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5

  # Optional: DuckDB service for testing
  duckdb:
    image: ghcr.io/duckdb/duckdb-web:latest
    ports:
      - 8123:8123
    volumes:
      - duckdb-data:/data
    profiles:
      - duckdb

volumes:
  postgres-db-volume:
  duckdb-data:
