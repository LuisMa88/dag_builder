# Example DuckDB pipeline config for dag_builder

# Airflow/DAG metadata
dag_id: "duckdb_pipeline"
airflow_conn_id: "duckdb_conn"  # Optional, can use direct config

# Your GraphQL API endpoint (for GraphQL example)
api_url: "https://api-eu-west-2.hygraph.com/v2/cktmv9n8g0f0d01z6c8z7c9xw/master"

# The target table name for dlt (used as the resource name)
table_name: "duckdb_table"

# GraphQL query (optional - for GraphQL example)
graphql_query: |
  {
    movies(first: 5) {
      title
      slug
      imdbId
    }
  }

# DuckDB specific settings
duckdb_config:
  memory: true  # Use in-memory database
  # database_path: "data.duckdb"  # Or use file-based database
  # read_only: false  # For file-based databases

# Common settings
incremental_cursor: "updated_at"
task_id: "ingest_to_duckdb"
schedule: "@daily"
start_date: "2024-01-01"
catchup: false
